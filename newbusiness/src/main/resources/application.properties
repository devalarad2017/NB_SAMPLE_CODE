# =============================================================================
# Insurance New Business Platform — application.properties
# Deployed on OpenShift Container Platform (OCP)
#
# OCP DEPLOYMENT NOTES:
#   Sensitive values (DB password, API tokens) come from OCP Secrets mounted
#   as environment variables. Never hardcode credentials here.
#   Non-sensitive config (URLs, pool sizes) come from OCP ConfigMap.
#
#   OCP ConfigMap example:
#     DB_HOST=postgres-service.insurance.svc.cluster.local
#     DB_PORT=5432
#     DB_NAME=newbusiness
#     ELIGIBILITY_API_URL=http://eligibility-service.insurance.svc.cluster.local/api/check
#
#   OCP Secret example (base64 encoded in secret yaml):
#     DB_PASSWORD=<base64>
#     PARTNER_A_TOKEN=<base64>
# =============================================================================

# ── Server ─────────────────────────────────────────────────────────────────
server.port=8080
spring.application.name=insurance-newbusiness

# ── OCP Health Probe endpoints ─────────────────────────────────────────────
# OCP uses these for liveness and readiness probes.
# Liveness probe:  GET /actuator/health/liveness
# Readiness probe: GET /actuator/health/readiness
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# ── Database ───────────────────────────────────────────────────────────────
# DB_HOST, DB_PORT, DB_NAME come from OCP ConfigMap
# DB_USERNAME, DB_PASSWORD come from OCP Secret
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:newbusiness}
spring.datasource.username=${DB_USERNAME:newbusiness_user}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── HikariCP Connection Pool ───────────────────────────────────────────────
# OCP pods typically get 2-4 vCPUs. Pool sized accordingly.
# max-pool-size * pod replicas must not exceed DB max_connections.
# Example: 20 pool * 3 replicas = 60 connections max from this service.
spring.datasource.hikari.pool-name=NewBusinessPool
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
# OCP pods can be killed and restarted — validate connections on borrow
spring.datasource.hikari.connection-test-query=SELECT 1

# ── JPA ────────────────────────────────────────────────────────────────────
# ddl-auto=validate: Hibernate checks schema matches entities at startup.
# Schema is managed by V1__create_tables.sql — never let Hibernate alter it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ── Swagger / OpenAPI ──────────────────────────────────────────────────────
# Swagger UI: http://localhost:8080/swagger-ui.html
# OpenAPI JSON: http://localhost:8080/v3/api-docs
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── Downstream API Endpoints ───────────────────────────────────────────────
# All URLs come from OCP ConfigMap — never hardcoded.
# On OCP, internal service URLs follow format:
#   http://<service-name>.<namespace>.svc.cluster.local/<path>
#
# IMPORTANT: Property key must match the @Value annotation in each ApiClient.
# See EligibilityApiClient, MedicalApiClient etc. for the @Value key used.
api.endpoints.eligibility=${ELIGIBILITY_API_URL:http://localhost:8081/api/check}
api.endpoints.edc=${EDC_API_URL:http://localhost:8082/api/credit-check}
api.endpoints.pasa=${PASA_API_URL:http://localhost:8083/api/score}
api.endpoints.tasa=${TASA_API_URL:http://localhost:8084/api/score}
api.endpoints.medical=${MEDICAL_API_URL:http://localhost:8085/api/assessment}
api.endpoints.kyc=${KYC_API_URL:http://localhost:8086/api/verify}
api.endpoints.premium=${PREMIUM_API_URL:http://localhost:8087/api/calculate}
api.endpoints.underwriting=${UNDERWRITING_API_URL:http://localhost:8088/api/decision}
api.endpoints.document=${DOCUMENT_API_URL:http://localhost:8089/api/generate}
api.endpoints.proposal=${PROPOSAL_API_URL:http://localhost:8090/api/submit}
api.endpoints.pas=${PAS_API_URL:http://localhost:8091/api/applications}

# ── REST Client Timeouts ───────────────────────────────────────────────────
# Tune per-API SLAs. Scoring APIs (EDC/PASA/TASA) run in parallel so
# total scoring wait time = max(EDC, PASA, TASA) not sum of all three.
api.client.connect-timeout-ms=${API_CONNECT_TIMEOUT:5000}
api.client.read-timeout-ms=${API_READ_TIMEOUT:30000}

# ── Thread Pool for Journey Execution ─────────────────────────────────────
# journeyTaskExecutor handles:
#   1. Full async journey per request (one thread per inbound request)
#   2. Parallel scoring within SCORING_STAGE (3 threads: EDC, PASA, TASA)
#
# Sizing guide for OCP:
#   core = expected concurrent requests
#   max  = burst capacity (3 threads per request for parallel scoring stage)
journey.executor.core-pool-size=${JOURNEY_POOL_CORE:10}
journey.executor.max-pool-size=${JOURNEY_POOL_MAX:50}
journey.executor.queue-capacity=${JOURNEY_POOL_QUEUE:100}

# ── Retry Configuration ────────────────────────────────────────────────────
# @Retryable picks up these values. Defined here so OCP ConfigMap can tune
# retry behaviour without a code deployment.
api.retry.max-attempts=${API_RETRY_ATTEMPTS:3}
api.retry.delay-ms=${API_RETRY_DELAY:2000}
api.retry.multiplier=${API_RETRY_MULTIPLIER:2}

# ── Logging ────────────────────────────────────────────────────────────────
# [correlationId] in every log line via MDC — trace any request end-to-end.
# OCP collects stdout logs — no file appender needed on OCP.
logging.level.com.insurance.newbusiness=INFO
logging.level.org.springframework.retry=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %-5level %logger{36} - %msg%n
